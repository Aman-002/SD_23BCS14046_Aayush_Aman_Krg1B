spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── Core Service: handles auth, products, wishlist, feedback, coupons ──
        - id: core-auth
          uri: lb://core-service
          predicates:
            - Path=/api/auth/**

        - id: core-products
          uri: lb://core-service
          predicates:
            - Path=/api/products/**

        - id: core-wishlist
          uri: lb://core-service
          predicates:
            - Path=/api/wishlist/**

        - id: core-feedback
          uri: lb://core-service
          predicates:
            - Path=/api/feedback/**

        - id: core-coupons
          uri: lb://core-service
          predicates:
            - Path=/api/coupons/**

        # ── Order Service: handles cart, orders, payment ───────────────────────
        - id: order-cart
          uri: lb://order-service
          predicates:
            - Path=/api/cart/**

        - id: order-orders
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: order-payment
          uri: lb://order-service
          predicates:
            - Path=/api/payment/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
